<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" role="img" aria-label="Salon booking preview" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="1200" height="750" fill="#fbfaf6"/>
  <g stroke="#e7e3da" stroke-width="1" opacity="0.6">
    <path d="M0 130H1200M0 260H1200M0 390H1200M0 520H1200M0 650H1200"/>
  </g>
  <!-- booking card -->
  <rect x="150" y="110" width="600" height="540" rx="18" fill="#ffffff" stroke="#e7e3da"/>
  <text x="186" y="168" font-size="13" fill="#6b6862" font-family="ui-monospace, monospace">BOOK AN APPOINTMENT</text>
  <text x="186" y="208" font-size="30" font-weight="700" fill="#16150f">Haircut &amp; Style</text>
  <text x="186" y="236" font-size="15" fill="#6b6862">45 min · with Aisha</text>
  <rect x="186" y="260" width="528" height="1" fill="#e7e3da"/>
  <text x="186" y="300" font-size="13" fill="#6b6862" font-family="ui-monospace, monospace">FRIDAY, 20 JUNE</text>
  <!-- slots -->
  <g font-size="15" font-weight="600">
    <rect x="186" y="320" width="120" height="48" rx="10" fill="#fbfaf6" stroke="#e7e3da"/><text x="246" y="350" fill="#16150f" text-anchor="middle">10:00</text>
    <rect x="318" y="320" width="120" height="48" rx="10" fill="#fbfaf6" stroke="#e7e3da"/><text x="378" y="350" fill="#16150f" text-anchor="middle">11:30</text>
    <rect x="450" y="320" width="120" height="48" rx="10" fill="#2b2bf5"/><text x="510" y="350" fill="#ffffff" text-anchor="middle">1:00</text>
    <rect x="582" y="320" width="120" height="48" rx="10" fill="#fbfaf6" stroke="#e7e3da"/><text x="642" y="350" fill="#16150f" text-anchor="middle">2:30</text>
    <rect x="186" y="380" width="120" height="48" rx="10" fill="#fbfaf6" stroke="#e7e3da"/><text x="246" y="410" fill="#16150f" text-anchor="middle">4:00</text>
    <rect x="318" y="380" width="120" height="48" rx="10" fill="#f4f2ec"/><text x="378" y="410" fill="#b8b4ab" text-anchor="middle">5:30</text>
    <rect x="450" y="380" width="120" height="48" rx="10" fill="#fbfaf6" stroke="#e7e3da"/><text x="510" y="410" fill="#16150f" text-anchor="middle">6:00</text>
    <rect x="582" y="380" width="120" height="48" rx="10" fill="#fbfaf6" stroke="#e7e3da"/><text x="642" y="410" fill="#16150f" text-anchor="middle">7:30</text>
  </g>
  <rect x="186" y="460" width="528" height="1" fill="#e7e3da"/>
  <text x="186" y="500" font-size="15" fill="#6b6862">Total</text>
  <text x="714" y="500" font-size="20" font-weight="700" fill="#16150f" text-anchor="end">₹600</text>
  <rect x="186" y="540" width="528" height="56" rx="28" fill="#16150f"/>
  <text x="450" y="575" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">Confirm booking</text>
  <!-- reminder chip -->
  <rect x="800" y="200" width="280" height="120" rx="16" fill="#ffffff" stroke="#e7e3da"/>
  <circle cx="834" cy="240" r="14" fill="#fff3dd"/><text x="834" y="245" font-size="14" text-anchor="middle">🔔</text>
  <text x="862" y="236" font-size="14" font-weight="700" fill="#16150f">Reminder sent</text>
  <text x="862" y="258" font-size="12" fill="#6b6862" font-family="ui-monospace, monospace">WhatsApp · 24h before</text>
  <rect x="824" y="284" width="232" height="1" fill="#e7e3da"/>
  <text x="824" y="306" font-size="12" fill="#6b6862">No-shows down 38%</text>
  <!-- staff chip -->
  <rect x="800" y="360" width="280" height="150" rx="16" fill="#ffffff" stroke="#e7e3da"/>
  <text x="824" y="398" font-size="12" fill="#6b6862" font-family="ui-monospace, monospace">YOUR TEAM</text>
  <circle cx="844" cy="438" r="20" fill="#ffe6bd"/><text x="844" y="444" font-size="14" font-weight="700" fill="#9a6a05" text-anchor="middle">A</text>
  <circle cx="892" cy="438" r="20" fill="#eef0ff"/><text x="892" y="444" font-size="14" font-weight="700" fill="#2b2bf5" text-anchor="middle">R</text>
  <circle cx="940" cy="438" r="20" fill="#edf6ee"/><text x="940" y="444" font-size="14" font-weight="700" fill="#3a7a43" text-anchor="middle">M</text>
  <text x="824" y="488" font-size="12" fill="#6b6862">Each with their own calendar</text>
</svg>
