    <circle cx="220" cy="390" r="16" fill="#edf6ee"/><text x="220" y="395" font-size="13" font-weight="700" fill="#3a7a43" text-anchor="middle">N</text>
    <text x="252" y="386" font-weight="700" fill="#16150f">Neha Iyer</text><text x="252" y="406" font-size="13" fill="#6b6862">Spa + style · with Meera</text>
    <rect x="980" y="374" width="92" height="26" rx="13" fill="#edf6ee"/><text x="1026" y="391" font-size="11" font-weight="700" fill="#3a7a43" text-anchor="middle">CONFIRMED</text>
