    <text x="252" y="296" font-weight="700" fill="#16150f">Aman Verma</text><text x="252" y="316" font-size="13" fill="#6b6862">Haircut · with Rohit</text>
    <rect x="980" y="284" width="92" height="26" rx="13" fill="#fff3dd"/><text x="1026" y="301" font-size="11" font-weight="700" fill="#9a6a05" text-anchor="middle">REMINDED</text>
    <line x1="90" y1="342" x2="1110" y2="342" stroke="#f1efe8"/>

