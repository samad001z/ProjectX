<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" role="img" aria-label="Van Lavino admin dashboard" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="1200" height="750" fill="#fbfaf6"/>
  <!-- sidebar -->
  <rect x="60" y="60" width="220" height="630" rx="16" fill="#ffffff" stroke="#e7e3da"/>
  <text x="86" y="104" font-size="18" font-weight="800" fill="#16150f">Van<tspan fill="#2b2bf5">Lavino</tspan></text>
  <rect x="80" y="140" width="180" height="40" rx="10" fill="#eef0ff"/>
  <text x="100" y="165" font-size="14" font-weight="700" fill="#2b2bf5">Orders</text>
  <text x="100" y="212" font-size="14" fill="#6b6862">Menu</text>
  <text x="100" y="252" font-size="14" fill="#6b6862">Tables</text>
  <text x="100" y="292" font-size="14" fill="#6b6862">Reports</text>
  <text x="100" y="332" font-size="14" fill="#6b6862">Staff</text>
  <!-- main -->
  <text x="320" y="100" font-size="26" font-weight="700" fill="#16150f">Live orders</text>
  <text x="320" y="124" font-size="13" fill="#6b6862" font-family="ui-monospace, monospace">updated just now</text>
  <!-- stat cards -->
  <g>
    <rect x="320" y="150" width="260" height="110" rx="14" fill="#ffffff" stroke="#e7e3da"/>
    <text x="344" y="186" font-size="12" fill="#6b6862" font-family="ui-monospace, monospace">REVENUE TODAY</text>
    <text x="344" y="226" font-size="34" font-weight="700" fill="#16150f">₹18,420</text>
  </g>
  <g>
    <rect x="596" y="150" width="260" height="110" rx="14" fill="#ffffff" stroke="#e7e3da"/>
    <text x="620" y="186" font-size="12" fill="#6b6862" font-family="ui-monospace, monospace">ORDERS</text>
    <text x="620" y="226" font-size="34" font-weight="700" fill="#16150f">64</text>
  </g>
  <g>
    <rect x="872" y="150" width="268" height="110" rx="14" fill="#16150f"/>
    <text x="896" y="186" font-size="12" fill="#cfcdc6" font-family="ui-monospace, monospace">AVG TICKET</text>
    <text x="896" y="226" font-size="34" font-weight="700" fill="#ffb020">₹288</text>
  </g>
  <!-- table header -->
  <rect x="320" y="288" width="820" height="402" rx="14" fill="#ffffff" stroke="#e7e3da"/>
  <text x="344" y="326" font-size="12" fill="#6b6862" font-family="ui-monospace, monospace">TABLE</text>
  <text x="470" y="326" font-size="12" fill="#6b6862" font-family="ui-monospace, monospace">ITEMS</text>
  <text x="940" y="326" font-size="12" fill="#6b6862" font-family="ui-monospace, monospace">TOTAL</text>
  <text x="1116" y="326" font-size="12" fill="#6b6862" font-family="ui-monospace, monospace" text-anchor="end">STATUS</text>
  <rect x="344" y="340" width="772" height="1" fill="#e7e3da"/>
  <g font-size="15" fill="#16150f">
    <text x="344" y="380" font-weight="700">07</text>
    <text x="470" y="380">Cold Brew, Croissant</text>
    <text x="940" y="380">₹430</text>
    <rect x="1052" y="366" width="64" height="22" rx="11" fill="#fff3dd"/><text x="1084" y="381" font-size="11" font-weight="700" fill="#9a6a05" text-anchor="middle">NEW</text>
    <rect x="344" y="400" width="772" height="1" fill="#e7e3da"/>
    <text x="344" y="440" font-weight="700">03</text>
    <text x="470" y="440">Cappuccino x2</text>
    <text x="940" y="440">₹260</text>
    <rect x="1044" y="426" width="72" height="22" rx="11" fill="#eef0ff"/><text x="1080" y="441" font-size="11" font-weight="700" fill="#2b2bf5" text-anchor="middle">MAKING</text>
    <rect x="344" y="460" width="772" height="1" fill="#e7e3da"/>
    <text x="344" y="500" font-weight="700">09</text>
    <text x="470" y="500">Pasta, Lemonade</text>
    <text x="940" y="500">₹520</text>
    <rect x="1040" y="486" width="76" height="22" rx="11" fill="#edf6ee"/><text x="1078" y="501" font-size="11" font-weight="700" fill="#3a7a43" text-anchor="middle">SERVED</text>
    <rect x="344" y="520" width="772" height="1" fill="#e7e3da"/>
    <text x="344" y="560" font-weight="700">12</text>
    <text x="470" y="560">Mocha, Brownie</text>
    <text x="940" y="560">₹380</text>
    <rect x="1040" y="546" width="76" height="22" rx="11" fill="#edf6ee"/><text x="1078" y="561" font-size="11" font-weight="700" fill="#3a7a43" text-anchor="middle">SERVED</text>
  </g>
</svg>
