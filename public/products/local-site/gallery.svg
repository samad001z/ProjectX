<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" role="img" aria-label="Local business portfolio gallery" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="1200" height="750" fill="#fbfaf6"/>
  <text x="80" y="100" font-size="13" fill="#6b6862" font-family="ui-monospace, monospace">SELECTED WORK</text>
  <text x="80" y="150" font-size="38" font-weight="700" fill="#16150f">A few recent pieces</text>
  <!-- gallery grid -->
  <g stroke="#e7e3da">
    <rect x="80" y="200" width="340" height="220" rx="14" fill="#f1ede4"/>
    <rect x="440" y="200" width="340" height="220" rx="14" fill="#ece6da"/>
    <rect x="800" y="200" width="320" height="220" rx="14" fill="#f1ede4"/>
    <rect x="80" y="440" width="340" height="220" rx="14" fill="#ece6da"/>
