  <circle cx="360" cy="252" r="22" fill="#ffb020" opacity="0.65"/>
  <circle cx="1070" cy="492" r="22" fill="#ffb020" opacity="0.65"/>
  <!-- captions -->
  <g font-size="13" fill="#16150f" font-weight="600">
    <text x="96" y="412">Walnut dining table</text>
    <text x="456" y="412">Café bar seating</text>
