  <!-- simple shapes inside tiles -->
  <path d="M80 380 L180 310 L260 360 L340 300 L420 350 V420 H80 Z" fill="#e3ddd0"/>
  <path d="M440 380 L540 320 L640 370 L720 320 L780 360 V420 H440 Z" fill="#ddd6c8"/>
  <path d="M800 380 L880 330 L980 380 L1060 330 L1120 365 V420 H800 Z" fill="#e3ddd0"/>
